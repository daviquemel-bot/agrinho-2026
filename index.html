<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte: O Futuro Sustentável</title>
    <style>
        /* CONFIGURAÇÕES GERAIS - TEMA ESCURO E AZUL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            line-height: 1.8;
        }

        a {
            color: #45f3ff;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            color: #1f98f4;
        }

        /* CABEÇALHO */
        header {
            background-color: rgba(11, 12, 16, 0.95);
            border-bottom: 2px solid #1f98f4;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #45f3ff;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 30px;
        }

        /* BANNER PRINCIPAL */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(11, 12, 16, 1)), 
                        url('https://images.unsplash.com/photo-1530595467537-0b5996c41f2d?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            border-bottom: 1px solid rgba(69, 243, 255, 0.2);
        }

        .hero h2 {
            font-size: 3.5rem;
            color: #fff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .hero h2 span {
            color: #45f3ff;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.5);
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 800px;
            color: #a9b7c6;
        }

        /* SEÇÕES DE CONTEÚDO */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px;
        }

        .section-title {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            width: 60%;
            height: 4px;
            background-color: #45f3ff;
            bottom: -10px;
            left: 0;
            box-shadow: 0 0 8px #45f3ff;
        }

        /* LAYOUT EM BLOCOS (TEXTO + IMAGEM) */
        .content-block {
            display: flex;
            align-items: center;
            gap: 50px;
            margin-bottom: 80px;
        }

        .content-block.reverse {
            flex-direction: row-reverse;
        }

        .text-side {
            flex: 1;
        }

        .text-side p {
            margin-bottom: 20px;
            font-size: 1.1rem;
            text-align: justify;
        }
